baseURL = 'https://example.org/'
locale = 'en-us'
title = 'This Is A Blog Post About'
theme = 'PaperMod'
paginate = 10

[params]
  env = 'production'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.homeInfoParams]
    Title = 'This Is A Blog Post About'
    Content = 'Technical notes, code deep-dives, and engineering explorations.'

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/'

[markup]
  [markup.highlight]
    style = 'monokai'
    lineNos = true
    anchorLineNos = true
    codeFences = true
    guessSyntax = true

  [markup.goldmark.renderer]
    unsafe = true

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = 'Posts'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = 'Tags'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'search'
    name = 'Search'
    url = '/search/'
    weight = 30

[outputs]
  home = ['HTML', 'RSS', 'JSON']
